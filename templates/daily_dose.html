<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Dose — 200-Day Journey</title>
    <script>
        (function () {
            var t = localStorage.getItem('theme');
            if (t === 'dark' || t === 'light') document.documentElement.setAttribute('data-theme', t);
        })();
    </script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/daily_dose.css') }}">
</head>
<body>
    <div class="daily-dose-app">
        <aside class="daily-dose-sidebar">
            <div class="daily-dose-sidebar-header">
                <a href="/" class="daily-dose-back">
                    <i class="fas fa-arrow-left"></i>
                    <span>Back to Chat</span>
                </a>
            </div>
            <div class="daily-dose-progress-section">
                <span class="daily-dose-sidebar-label" id="dailyDoseSidebarLabel">Day 1 of 200</span>
                <div class="daily-dose-progress-bar" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="200">
                    <div class="daily-dose-progress-fill" id="dailyDoseProgressFill"></div>
                </div>
                <span class="daily-dose-progress-text" id="dailyDoseProgressText">0 / 200</span>
            </div>
            <div class="daily-dose-actions">
                <button type="button" class="daily-dose-btn daily-dose-btn-today" id="btnToday">
                    <i class="fas fa-calendar-day"></i>
                    <span>Today</span>
                </button>
            </div>
            <div class="daily-dose-footer">
                <button type="button" class="daily-dose-theme-toggle" id="themeToggle" aria-label="Toggle theme">
                    <i class="fas fa-moon" id="themeIcon"></i>
                    <span>Theme</span>
                </button>
            </div>
        </aside>
        <main class="daily-dose-main">
            <header class="daily-dose-header">
                <h1>Daily Dose</h1>
                <p class="daily-dose-subtitle">Practical wisdom from finance & marketing — one teaching per day</p>
            </header>
            <div class="daily-dose-content" id="dailyDoseContent">
                <div class="daily-dose-loading" id="dailyDoseLoading">
                    <div class="loading-dots"><span></span><span></span><span></span></div>
                    <p>Loading your dose...</p>
                </div>
                <div class="daily-dose-card hidden" id="dailyDoseCard">
                    <div class="daily-dose-badges">
                        <span class="daily-dose-day-badge" id="dayBadge">Day 1</span>
                        <span class="daily-dose-date-badge" id="dateBadge"></span>
                        <span class="daily-dose-theme-badge" id="themeBadge"></span>
                    </div>
                    <h2 class="daily-dose-title" id="doseTitle"></h2>
                    <p class="daily-dose-source" id="doseSource"></p>
                    <p class="daily-dose-question" id="doseQuestion"></p>
                    <div class="daily-dose-message" id="doseMessage"></div>
                    <div class="daily-dose-card-actions">
                        <button type="button" class="daily-dose-btn daily-dose-btn-secondary" id="btnCopy" title="Copy">
                            <i class="fas fa-copy"></i>
                            <span>Copy</span>
                        </button>
                        <button type="button" class="daily-dose-btn daily-dose-btn-secondary" id="btnShare" title="Share">
                            <i class="fas fa-share-alt"></i>
                            <span>Share</span>
                        </button>
                        <a href="/" class="daily-dose-btn daily-dose-btn-secondary" id="linkAskAdvisor" style="text-decoration: none; color: inherit;">
                            <i class="fas fa-comments"></i>
                            <span>Ask the Advisor</span>
                        </a>
                    </div>
                </div>
                <div class="daily-dose-error hidden" id="dailyDoseError">
                    <p id="dailyDoseErrorMessage"></p>
                </div>
            </div>
        </main>
    </div>
    <script src="{{ url_for('static', filename='js/daily_dose.js') }}"></script>
</body>
</html>
